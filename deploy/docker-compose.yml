services:
  pwpush:
    image: pglombardo/pwpush:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:5100:5100"
    volumes:
      - pwpush-storage:/opt/PasswordPusher/storage
      - ./custom.css:/opt/PasswordPusher/app/assets/stylesheets/custom.css:ro
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "-H", "Host: secrets.collectifweb.ca", "http://localhost:5100/up"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pwpush-storage:
